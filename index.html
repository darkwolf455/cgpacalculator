<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GradeSphere Pro | Smart CGPA Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        slate: {
                            950: '#020617',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        :root {
            --primary-hue: 195;
            --primary: hsl(var(--primary-hue), 89%, 60%);
        }

        .glass {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .text-gradient {
            background: linear-gradient(135deg, var(--primary), #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { 
            background: rgba(255, 255, 255, 0.1); 
            border-radius: 10px; 
        }

        .accent-glow {
            box-shadow: 0 0 20px hsla(var(--primary-hue), 89%, 60%, 0.3);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade {
            animation: fadeIn 0.4s ease-out forwards;
        }

        /* Prevent spin buttons on number inputs */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen selection:bg-cyan-500/30">

    <div id="capture-area" class="max-w-6xl mx-auto px-6 py-8">
        <!-- Background Orbs -->
        <div class="fixed inset-0 pointer-events-none -z-10 overflow-hidden">
            <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-cyan-500/10 blur-[120px] rounded-full"></div>
            <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-indigo-500/10 blur-[120px] rounded-full"></div>
        </div>

        <header class="flex justify-between items-center mb-10">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-cyan-400 to-indigo-600 flex items-center justify-center accent-glow">
                    <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/>
                    </svg>
                </div>
                <div>
                    <h1 class="text-2xl font-black tracking-tight text-white font-display">Grade<span class="text-cyan-400">Sphere</span></h1>
                    <p class="text-[10px] uppercase tracking-[0.2em] font-bold text-slate-500">Academic Intelligence</p>
                </div>
            </div>

            <div class="flex items-center gap-3">
                <div class="flex gap-2 p-1.5 glass rounded-xl bg-slate-900/50">
                    <button onclick="setAccent(195)" class="w-5 h-5 rounded-full bg-cyan-400 hover:scale-110 transition-transform"></button>
                    <button onclick="setAccent(235)" class="w-5 h-5 rounded-full bg-indigo-500 hover:scale-110 transition-transform"></button>
                    <button onclick="setAccent(155)" class="w-5 h-5 rounded-full bg-emerald-500 hover:scale-110 transition-transform"></button>
                    <button onclick="setAccent(345)" class="w-5 h-5 rounded-full bg-rose-500 hover:scale-110 transition-transform"></button>
                </div>
                <button onclick="exportPDF()" class="p-3 glass rounded-xl text-slate-400 hover:text-white transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                </button>
                <button onclick="resetAll()" class="p-3 glass rounded-xl text-slate-400 hover:text-rose-400 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                </button>
            </div>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Left: Semesters -->
            <div class="lg:col-span-8 space-y-6">
                <div id="semesters-container" class="space-y-6">
                    <!-- Dynamic Semesters -->
                </div>

                <button onclick="addSemester()" class="w-full py-4 glass rounded-2xl text-sm font-bold text-slate-400 hover:text-cyan-400 hover:border-cyan-500/30 transition-all flex items-center justify-center gap-2 group">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="group-hover:rotate-90 transition-transform"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Add New Semester Track
                </button>
            </div>

            <!-- Right: Insights -->
            <aside class="lg:col-span-4 space-y-6">
                <!-- Score Card -->
                <div class="glass p-8 rounded-[2.5rem] flex flex-col items-center justify-center text-center relative overflow-hidden ring-1 ring-white/10">
                    <div class="absolute -top-10 -right-10 w-32 h-32 bg-cyan-500/10 rounded-full blur-3xl"></div>
                    <span class="text-[10px] uppercase tracking-[0.3em] text-slate-500 mb-3 font-black">Calculated CGPA</span>
                    <h2 id="cgpa-display" class="text-7xl font-black text-gradient font-display tracking-tight">0.00</h2>
                    
                    <div class="grid grid-cols-2 gap-4 w-full mt-8 pt-8 border-t border-white/5">
                        <div class="text-center">
                            <p class="text-[9px] text-slate-500 uppercase font-black tracking-widest mb-1">Credits</p>
                            <p id="total-credits" class="text-xl font-bold text-white">0</p>
                        </div>
                        <div class="text-center">
                            <p class="text-[9px] text-slate-500 uppercase font-black tracking-widest mb-1">Points</p>
                            <p id="total-points" class="text-xl font-bold text-white">0</p>
                        </div>
                    </div>
                </div>

                <!-- Insights Info -->
                <div class="glass p-6 rounded-3xl space-y-4">
                    <h3 class="text-xs font-black text-slate-500 uppercase tracking-widest">Performance Insights</h3>
                    
                    <div class="flex items-center justify-between p-4 bg-white/5 rounded-2xl border border-white/5">
                        <span class="text-xs text-slate-400 font-medium">Highest Scorer</span>
                        <span id="best-subject" class="text-xs font-bold text-cyan-400">-</span>
                    </div>
                    
                    <div class="flex items-center justify-between p-4 bg-white/5 rounded-2xl border border-white/5">
                        <span class="text-xs text-slate-400 font-medium">Academic Trend</span>
                        <span id="growth-trend" class="text-xs font-bold text-indigo-400">Steady</span>
                    </div>
                </div>

                <!-- Chart -->
                <div class="glass p-6 rounded-3xl">
                    <h3 class="text-xs font-black text-slate-500 uppercase tracking-widest mb-6">Grade Distribution</h3>
                    <div class="h-48 flex items-center justify-center">
                        <canvas id="gradeChart"></canvas>
                    </div>
                </div>
            </aside>
        </main>
    </div>

    <script>
        const GRADE_POINTS = { 'A+': 10, 'A': 9, 'B+': 8, 'B': 7, 'C': 6, 'D': 5, 'F': 0 };
        
        let state = {
            semesters: [
                {
                    id: Date.now(),
                    title: 'Semester 01',
                    subjects: [{ id: Date.now() + 1, name: '', credits: 0, grade: 'A+' }]
                }
            ],
            accent: 195
        };

        let chart = null;

        function init() {
            const saved = localStorage.getItem('gradesphere-pro');
            if (saved) {
                try {
                    state = JSON.parse(saved);
                } catch(e) { console.error("Load failed", e); }
            }
            
            setAccent(state.accent);
            renderAll();
            initChart();
            updateCalculations();
        }

        function setAccent(hue) {
            state.accent = hue;
            document.documentElement.style.setProperty('--primary-hue', hue);
            document.documentElement.style.setProperty('--primary', `hsl(${hue}, 89%, 60%)`);
            save();
            if (chart) {
                chart.data.datasets[0].backgroundColor = `hsla(${hue}, 89%, 60%, 0.4)`;
                chart.data.datasets[0].borderColor = `hsl(${hue}, 89%, 60%)`;
                chart.update();
            }
        }

        function save() {
            localStorage.setItem('gradesphere-pro', JSON.stringify(state));
        }

        function renderAll() {
            const container = document.getElementById('semesters-container');
            container.innerHTML = state.semesters.map((sem, sIndex) => `
                <div class="glass p-6 rounded-[2rem] border border-white/5 animate-fade" style="animation-delay: ${sIndex * 0.1}s">
                    <div class="flex justify-between items-center mb-6">
                        <div class="flex items-center gap-3">
                            <h2 class="text-lg font-bold text-white font-display">${sem.title}</h2>
                            <span id="sgpa-${sem.id}" class="text-xs font-bold text-cyan-400 bg-cyan-400/10 px-3 py-1 rounded-full border border-cyan-400/20">GPA: 0.00</span>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="addSubject(${sem.id})" class="text-[10px] font-black uppercase tracking-wider px-4 py-2 bg-white/5 hover:bg-white/10 rounded-xl transition-colors">Add Course</button>
                            ${state.semesters.length > 1 ? `
                                <button onclick="removeSemester(${sem.id})" class="p-2 text-rose-500 hover:bg-rose-500/10 rounded-xl transition-colors">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>
                                </button>
                            ` : ''}
                        </div>
                    </div>

                    <div id="subjects-${sem.id}" class="space-y-3">
                        ${sem.subjects.map(sub => `
                            <div class="grid grid-cols-12 gap-3 items-center" data-sub-id="${sub.id}">
                                <div class="col-span-6 md:col-span-7">
                                    <input type="text" 
                                        placeholder="Course Title" 
                                        value="${sub.name}" 
                                        oninput="updateSubjectData(${sem.id}, ${sub.id}, 'name', this.value)"
                                        class="w-full bg-slate-900/50 border border-white/5 focus:border-cyan-500/30 rounded-xl px-4 py-2.5 text-xs text-white outline-none transition-all">
                                </div>
                                <div class="col-span-3 md:col-span-2">
                                    <input type="number" 
                                        placeholder="Credits" 
                                        value="${sub.credits || ''}" 
                                        oninput="updateSubjectData(${sem.id}, ${sub.id}, 'credits', this.value)"
                                        class="w-full bg-slate-900/50 border border-white/5 focus:border-cyan-500/30 rounded-xl px-4 py-2.5 text-xs text-white font-bold text-center outline-none transition-all">
                                </div>
                                <div class="col-span-3 md:col-span-2">
                                    <select onchange="updateSubjectData(${sem.id}, ${sub.id}, 'grade', this.value)"
                                        class="w-full bg-slate-900/50 border border-white/5 focus:border-cyan-500/30 rounded-xl px-4 py-2.5 text-xs text-white font-bold outline-none cursor-pointer">
                                        ${Object.keys(GRADE_POINTS).map(g => `<option value="${g}" ${sub.grade === g ? 'selected' : ''}>${g}</option>`).join('')}
                                    </select>
                                </div>
                                <button onclick="removeSubject(${sem.id}, ${sub.id})" 
                                    class="hidden md:flex items-center justify-center p-2 text-slate-500 hover:text-rose-500 transition-colors">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
                                </button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        // OPTIMIZED: Update data WITHOUT re-rendering full list to preserve focus
        function updateSubjectData(semId, subId, field, value) {
            const sem = state.semesters.find(s => s.id === semId);
            const sub = sem.subjects.find(s => s.id === subId);
            if (sub) {
                sub[field] = field === 'credits' ? (parseFloat(value) || 0) : value;
                save(); // Persistent save
                updateCalculations(); // Only update numbers in UI
            }
        }

        function addSemester() {
            const count = state.semesters.length + 1;
            state.semesters.push({
                id: Date.now(),
                title: `Semester ${count < 10 ? '0' + count : count}`,
                subjects: [{ id: Date.now() + 1, name: '', credits: 0, grade: 'A+' }]
            });
            renderAll();
            save();
            updateCalculations();
        }

        function removeSemester(id) {
            if (state.semesters.length > 1) {
                state.semesters = state.semesters.filter(s => s.id !== id);
                renderAll();
                save();
                updateCalculations();
            }
        }

        function addSubject(semId) {
            const sem = state.semesters.find(s => s.id === semId);
            sem.subjects.push({ id: Date.now(), name: '', credits: 0, grade: 'A+' });
            renderAll();
            save();
            updateCalculations();
        }

        function removeSubject(semId, subId) {
            const sem = state.semesters.find(s => s.id === semId);
            if (sem.subjects.length > 1) {
                sem.subjects = sem.subjects.filter(s => s.id !== subId);
                renderAll();
                save();
                updateCalculations();
            }
        }

        function updateCalculations() {
            let grandTotalCredits = 0;
            let grandTotalPoints = 0;
            let bestSub = null;
            let semesterScores = [];

            state.semesters.forEach(sem => {
                let semCredits = 0;
                let semPoints = 0;

                sem.subjects.forEach(sub => {
                    const c = parseFloat(sub.credits) || 0;
                    const p = GRADE_POINTS[sub.grade];
                    semCredits += c;
                    semPoints += (c * p);

                    if (!bestSub || GRADE_POINTS[sub.grade] > GRADE_POINTS[bestSub.grade]) {
                        if (sub.name) bestSub = sub;
                    }
                });

                const sgpa = semCredits > 0 ? (semPoints / semCredits).toFixed(2) : "0.00";
                
                // Update semester GPA badge in UI
                const badge = document.getElementById(`sgpa-${sem.id}`);
                if (badge) badge.innerText = `GPA: ${sgpa}`;

                grandTotalCredits += semCredits;
                grandTotalPoints += semPoints;
                semesterScores.push(parseFloat(sgpa));
            });

            const cgpa = grandTotalCredits > 0 ? (grandTotalPoints / grandTotalCredits).toFixed(2) : "0.00";

            // Update main displays
            document.getElementById('cgpa-display').innerText = cgpa;
            document.getElementById('total-credits').innerText = grandTotalCredits;
            document.getElementById('total-points').innerText = grandTotalPoints.toFixed(0);

            // Insights
            document.getElementById('best-subject').innerText = bestSub ? `${bestSub.name} (${bestSub.grade})` : "-";
            
            if (semesterScores.length > 1) {
                const current = semesterScores[semesterScores.length - 1];
                const prev = semesterScores[semesterScores.length - 2];
                const diff = (current - prev).toFixed(2);
                document.getElementById('growth-trend').innerText = diff > 0 ? `+${diff} Improving` : diff < 0 ? `${diff} Declining` : "Consistent";
                document.getElementById('growth-trend').className = `text-xs font-bold ${diff > 0 ? 'text-emerald-400' : diff < 0 ? 'text-rose-400' : 'text-indigo-400'}`;
            } else {
                document.getElementById('growth-trend').innerText = "Steady";
                document.getElementById('growth-trend').className = "text-xs font-bold text-indigo-400";
            }

            updateChart();
        }

        function initChart() {
            const ctx = document.getElementById('gradeChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: Object.keys(GRADE_POINTS),
                    datasets: [{
                        data: Array(7).fill(0),
                        backgroundColor: `hsla(${state.accent}, 89%, 60%, 0.4)`,
                        borderColor: `hsl(${state.accent}, 89%, 60%)`,
                        borderWidth: 1.5,
                        borderRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { display: false },
                        x: { grid: { display: false }, ticks: { color: '#64748b', font: { size: 9, weight: 'bold' } } }
                    }
                }
            });
        }

        function updateChart() {
            if (!chart) return;
            const counts = {};
            Object.keys(GRADE_POINTS).forEach(g => counts[g] = 0);
            
            state.semesters.forEach(sem => {
                sem.subjects.forEach(sub => {
                    if (sub.credits > 0) counts[sub.grade]++;
                });
            });

            chart.data.datasets[0].data = Object.values(counts);
            chart.update();
        }

        function resetAll() {
            if (confirm('Are you sure you want to clear all subjects? This cannot be undone.')) {
                state.semesters = [
                    {
                        id: Date.now(),
                        title: 'Semester 01',
                        subjects: [{ id: Date.now() + 1, name: '', credits: 0, grade: 'A+' }]
                    }
                ];
                save();
                renderAll();
                updateCalculations();
            }
        }

        async function exportPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');
            const element = document.getElementById('capture-area');
            
            // Temporary class for export mode (optional styling)
            element.classList.add('exporting');
            
            try {
                const canvas = await html2canvas(element, {
                    scale: 2,
                    useCORS: true,
                    backgroundColor: '#020617'
                });
                
                const imgData = canvas.toDataURL('image/png');
                const pdfWidth = doc.internal.pageSize.getWidth();
                const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
                
                doc.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
                doc.save('Academic_Report.pdf');
            } finally {
                element.classList.remove('exporting');
            }
        }

        init();
    </script>
</body>
</html>
